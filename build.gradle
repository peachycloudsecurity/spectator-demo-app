apply plugin: 'application'

application {
  mainClass = 'com.netflix.spectator.demo.DemoWebApplication'
}

dependencies {
  implementation project(':spectator-api')
  implementation project(':spectator-web-spring')
  implementation 'org.springframework.boot:spring-boot-starter-web:2.7.18'
}

// Demo app: relax quality checks so demo builds without repo-wide header/PMD config
checkstyle {
  ignoreFailures = true
}
spotbugsMain {
  ignoreFailures = true
}
pmdMain {
  ignoreFailures = true
}
